# Rule index for this repo's .octospec/rules/
# Each entry mirrors the frontmatter of its rule file so tooling can resolve
# injection without parsing every file.
#
# Resolution semantics:
#   - id must be globally unique (including inherited global rules).
#   - a repo-tier rule with the same id overrides the global one.
#   - inject_when = paths glob OR touches tag (union); a rule is injected once.
#   - when the injection budget is exceeded, keep load_bearing first, then by
#     priority (desc); truncated low-priority rules inject only their summary line.

rules:
  - id: installer-config-safety
    priority: 85
    load_bearing: true
    inject_when:
      paths:
        - "Sources/OpenIslandCore/*HookInstaller.swift"
        - "Sources/OpenIslandCore/*HookInstallationManager.swift"
        - "Sources/OpenIslandCore/OpenCodePluginInstallationManager.swift"
        - "Sources/OpenIslandCore/ClaudeStatusLineInstallationManager.swift"
        - "Sources/OpenIslandCore/ConfigBackup.swift"
        - "Sources/OpenIslandSetup/OpenIslandSetupCLI.swift"
      touches: ["installer", "config"]
  - id: bridge-transport-invariants
    priority: 85
    load_bearing: true
    inject_when:
      paths:
        - "Sources/OpenIslandCore/BridgeServer.swift"
        - "Sources/OpenIslandCore/BridgeTransport.swift"
        - "Sources/OpenIslandCore/LocalBridgeClient.swift"
        - "Sources/OpenIslandCore/BridgeCommandClient.swift"
        - "Sources/OpenIslandCore/AgentEvent.swift"
        - "Sources/OpenIslandHooks/OpenIslandHooksCLI.swift"
      touches: ["bridge", "ipc", "transport"]
  - id: session-state-invariants
    priority: 85
    load_bearing: true
    inject_when:
      paths:
        - "Sources/OpenIslandCore/SessionState.swift"
        - "Sources/OpenIslandCore/AgentSession.swift"
      touches: ["reducer", "session-state"]
  - id: design-tokens-sync
    priority: 70
    load_bearing: false
    inject_when:
      paths:
        - "DESIGN.md"
        - "Sources/OpenIslandApp/Design/DesignTokens.swift"
        - "Sources/OpenIslandApp/Design/BrandPalette.swift"
        - "Sources/OpenIslandApp/IslandDesignPalette.swift"
        - "Sources/OpenIslandApp/V6ClosedPillShape.swift"
      touches: ["design", "design-tokens", "visual-identity"]
  # - id: error-handling
